<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>🎵 Song Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    body {
  line-height: 1.6;
}

.container {
  animation: fadeIn 0.4s ease-out;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    transform: translateY(6px);
  }
  to {
    opacity: 1;
    transform: translateY(0);
  }
}

    .app-header {
  
background: linear-gradient(
    135deg,
    var(--primary),
    var(--primary-dark)
  );
  color: white;

  padding: 32px;
}
.header-icon {
  opacity: 0.9;
}
.header-content {
  display: flex;
  align-items: center;
  justify-content: center;
  
 gap: 20px;
  max-width: 900px;
  margin: 0 auto;

 
}

.header-icon {
  width: 56px;
  height: 56px;
  object-fit: contain;
}

    :root {
  /* Crosspoint-inspired theme */
  --primary: #1f3a5f;        /* Deep blue */
  --primary-dark: #162a44;   /* Darker blue */
  --accent: #8b1d1d;         /* Cross red */

  --bg: #f6f8fb;             /* Soft neutral background */
  --card: #ffffff;

  --text: #1f2937;           /* Charcoal text */
  --muted: #6b7280;

  --border: #e5e7eb;

  --danger: #b91c1c;
}

    * {
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

   

    .container {
      max-width: 900px;
      margin: -40px auto 40px;
      padding: 0 16px;
    }

   .card {
  background: var(--card);
  border-radius: 14px;
  padding: 28px;
  box-shadow: 0 12px 30px rgba(0,0,0,0.06);
  margin-bottom: 28px;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
}

.card:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 36px rgba(0,0,0,0.08);
}
 header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 32px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
    }

    .card h2 {
      margin-top: 0;
      font-size: 1.25rem;
    }

    .form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form input {
      width: 100%;
   
 padding: 13px 15px;
  border-radius: 10px;

      border: 1px solid var(--border);
     font-size: 0.95rem;
    }

    .form input:focus {
      outline: none;
      
border-color: var(--primary);
  box-shadow: 0 0 0 3px rgba(31, 58, 95, 0.15)

    }

    .form button {
      grid-column: span 2;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

.danger-btn {
  background: var(--danger);
}

.danger-btn:hover {
  background: #991b1b;
}

    .form button:hover {
      background: var(--primary-dark);
    }

    .song-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .song-item {
      background-color: #f1f5f9;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 0;
      border-bottom: 1px solid var(--border);
    }

    .song-item:last-child {
      border-bottom: none;
    }

    .song-name {
      font-weight: 600;
       font-size: 0.95rem;
    }

    .play-btn {
      text-decoration: none;
      background: var(--primary);
      color: white;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.85rem;
      transition: background 0.2s ease;
      
 display: inline-flex;
  align-items: center;
  gap: 6px;
  font-weight: 600;

    }

    .play-btn:hover {
      background: var(--primary-dark);
    }
    
.play-btn::before {
  content: "▶";
  font-size: 0.7rem;
}

#searchBox:focus {
  outline: none;
  border: 1px solid var(--primary);
  box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
}


    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 20px;
    }

    @media (max-width: 600px) {
      .form {
        grid-template-columns: 1fr;
      }

      .form button {
        grid-column: span 1;
        box-shadow: 0 6px 14px rgba(99,102,241,0.3);
      }
      
.form button:active {
  transform: scale(0.98);
}

    }
    .input-error {
  
  border-color: var(--danger) !important;
  background-color: #fff5f5;

}

.error-text {
  color: var(--danger);
  font-size: 0.85rem;
  margin-top: 6px;
  display: none;
}

button {
  border-radius: 999px;
  padding: 10px 18px;
  font-size: 0.9rem;
}

button:disabled {
  opacity: 0.6;
  cursor: not-allowed;
}

  </style>
</head>

<body>


<header class="app-header">
  <div class="header-content">
    <img
      src="crosspoint-icon.jpg"
      alt="Crosspoint CRC logo"
      class="header-icon"
    />
    <div>

  <h1>🎵 Crosspoint-CRC, Brampton <br> Youtube Song Tracker</h1>
  <p>Collection of all video links with timestamp from our worship service</p>

 </div>
  </div>
</header>


<div class="container">

  <div class="card">
    <h2>Add / Update Song</h2>
    <div class="form">
      <input id="songName" placeholder="Song name (unique)" />

<div id="songNameError" class="error-text">
  Song name already exists
</div>

      <input id="timestamp" type="number" placeholder="Start time (seconds)" />
      <input id="youtubeUrl" placeholder="YouTube URL" />
      <button id="saveButton" onclick="saveSong()">Save Song</button>
    </div>
  </div>
<input
  id="searchBox"
  placeholder="Search songs by keyword..."
  style="width:100%; padding:10px; margin-bottom:12px;"
  oninput="renderSongs()"
/>
  <div style="display:flex; gap:8px; margin-bottom:12px;">
  <button onclick="clearSearchFilter()">
    Remove search filter
  </button>

  <button onclick="clearSelection()">
    Clear selection
  </button>
</div>
  
  <div class="card">
    <h2>Saved Songs</h2>
    <ul id="songs" class="song-list"></ul>
  </div>

  <button class="danger-btn" onclick="deleteSelectedSongs()">
  Delete Selected
</button>
  
</div>

<footer>
  Built with ❤️ for Crosspoint CRC Worship Team
  <br> @2026 CRC Brampton. All Rights Reserved
   opacity: 0.85;
</footer>

<script>
let allSongs = [];
  let selectedSongs = new Set();


const songNameInput = document.getElementById('songName');
const songNameError = document.getElementById('songNameError');
const saveButton = document.getElementById('saveButton');
  const songName = document.getElementById('songName');
const youtubeUrl = document.getElementById('youtubeUrl');
const timestamp = document.getElementById('timestamp');
const songsList = document.getElementById('songs');

  songNameInput.addEventListener('input', validateSongName);

function isValidYouTubeUrl(url) {
  try {
    const parsed = new URL(url);

    return (
      parsed.hostname.includes('youtube.com') ||
      parsed.hostname.includes('youtu.be')
    );
  } catch (e) {
    return false;
  }
}
  function clearSearchFilter() {
  const searchBox = document.getElementById('searchBox');
  searchBox.value = '';
  renderSongs();
}

function songNameExists(name) {
  return allSongs.some(
    song => song.song_name.toLowerCase() === name.toLowerCase()
  );
}


function clearSelection() {
 
selectedSongs.clear();
  renderSongs();

}


  
async function saveSong() {
   if (saveButton.disabled) return;
  const name = songName.value.trim();

  if (!name) {
    alert('Song name is required');
    return;
  }

  if (songNameExists(name)) {
    const confirmUpdate = confirm(
      `"${name}" already exists.\n\nDo you want to update it?`
    );
    if (!confirmUpdate) return;
  }

  await fetch('/songs', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      song_name: name,
      youtube_url: youtubeUrl.value,
      start_seconds: Number(timestamp.value)
    })
  });

  songName.value = '';
  youtubeUrl.value = '';
  timestamp.value = '';

  loadSongs();
}

function validateSongName() {
  const name = songNameInput.value.trim().toLowerCase();

  const exists = allSongs.some(
    song => song.song_name.toLowerCase() === name
  );

  if (exists) {
    songNameInput.classList.add('input-error');
    songNameError.style.display = 'block';
    saveButton.disabled = true;
  } else {
    songNameInput.classList.remove('input-error');
    songNameError.style.display = 'none';
    saveButton.disabled = false;
  }
}
async function loadSongs() {
  const res = await fetch('/songs');
  allSongs = await res.json();
  renderSongs();
}

  async function deleteSelectedSongs() {
  const checked = Array.from(
    document.querySelectorAll('.song-check:checked')
  ).map(cb => cb.value);

  if (checked.length === 0) {
    alert('No songs selected');
    return;
  }

  const password = prompt('Enter admin password:');
  if (!password) return;

  const res = await fetch('/songs', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      song_names: checked,
      password
    })
  });

  if (!res.ok) {
    alert('Invalid password or delete failed');
    return;
  }

  alert('Songs deleted');
  loadSongs();
}
function renderSongs() {
  const keyword = document
    .getElementById('searchBox')
    .value
    .toLowerCase();

  songsList.innerHTML = '';

  allSongs
    .filter(song =>
      song.song_name.toLowerCase().includes(keyword)
    )
    .forEach(song => {
      const li = document.createElement('li');
      li.className = 'song-item';

    

      li.innerHTML = `
        <label style="display:flex;align-items:center;gap:8px">
          <input
  type="checkbox"
  class="song-check"
  value="${song.song_name}"
  ${selectedSongs.has(song.song_name) ? 'checked' : ''}
/>
          <span class="song-name">${song.song_name}</span>
        </label>
         
<a
  class="play-btn"
  href="#"
  data-url="${song.youtube_url}"
  data-start-seconds="${song.start_seconds}"
>
  Click to Play
</a>

      `;
      songsList.appendChild(li);

   const playButton = li.querySelector('.play-btn');

playButton.addEventListener('click', (e) => {
  e.preventDefault();

  let url = playButton.dataset.url;
  const startSeconds = playButton.dataset.startSeconds;

  // Safety check
  if (!url) {
    alert('Please delete and re-add entry with a valid URL');
    return;
  }

  // Append timestamp correctly
  if (url.includes('?')) {
    url += `&t=${startSeconds}s`;
  } else {
    url += `?t=${startSeconds}s`;
  }

  if (!isValidYouTubeUrl(url)) {
    alert('Please delete and re-add entry with a valid URL');
    return;
  }

  window.open(url, '_blank', 'noopener,noreferrer');
});


const checkbox = li.querySelector('.song-check');

checkbox.addEventListener('change', () => {
  if (checkbox.checked) {
    selectedSongs.add(song.song_name);
  } else {
    selectedSongs.delete(song.song_name);
  }
});
      
    });
}


// Load songs on page load
loadSongs();
</script>

</body>
</html>

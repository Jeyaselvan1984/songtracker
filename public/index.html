<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>🎵 Song Tracker</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --primary: #6366f1;
      --primary-dark: #4f46e5;
      --bg: #f4f6fb;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --border: #e5e7eb;
    }

    * {
      box-sizing: border-box;
      font-family: 'Inter', sans-serif;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
    }

    header {
      background: linear-gradient(135deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 32px;
      text-align: center;
    }

    header h1 {
      margin: 0;
      font-size: 2rem;
    }

    .container {
      max-width: 900px;
      margin: -40px auto 40px;
      padding: 0 16px;
    }

    .card {
      background: var(--card);
      border-radius: 12px;
      padding: 24px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.08);
      margin-bottom: 24px;
    }

    .card h2 {
      margin-top: 0;
      font-size: 1.25rem;
    }

    .form {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
    }

    .form input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 8px;
      border: 1px solid var(--border);
      font-size: 0.95rem;
    }

    .form input:focus {
      outline: none;
      border-color: var(--primary);
    }

    .form button {
      grid-column: span 2;
      padding: 14px;
      border-radius: 10px;
      border: none;
      background: var(--primary);
      color: white;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .form button:hover {
      background: var(--primary-dark);
    }

    .song-list {
      list-style: none;
      padding: 0;
      margin: 0;
    }

    .song-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 0;
      border-bottom: 1px solid var(--border);
    }

    .song-item:last-child {
      border-bottom: none;
    }

    .song-name {
      font-weight: 600;
    }

    .play-btn {
      text-decoration: none;
      background: var(--primary);
      color: white;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 0.85rem;
      transition: background 0.2s ease;
    }

    .play-btn:hover {
      background: var(--primary-dark);
    }

    footer {
      text-align: center;
      color: var(--muted);
      font-size: 0.85rem;
      padding: 20px;
    }

    @media (max-width: 600px) {
      .form {
        grid-template-columns: 1fr;
      }

      .form button {
        grid-column: span 1;
      }
    }
  </style>
</head>

<body>

<header>
  <h1>🎵 Song Tracker</h1>
  <p>Save your favorite YouTube moments</p>
</header>

<div class="container">

  <div class="card">
    <h2>Add / Update Song</h2>
    <div class="form">
      <input id="songName" placeholder="Song name (unique)" />
      <input id="timestamp" type="number" placeholder="Start time (seconds)" />
      <input id="youtubeUrl" placeholder="YouTube URL" />
      <button onclick="saveSong()">Save Song</button>
    </div>
  </div>
<input
  id="searchBox"
  placeholder="Search songs by keyword..."
  style="width:100%; padding:10px; margin-bottom:12px;"
  oninput="renderSongs()"
/>
  <div style="display:flex; gap:8px; margin-bottom:12px;">
  <button onclick="clearSearchFilter()">
    Remove search filter
  </button>

  <button onclick="clearSelection()">
    Clear selection
  </button>
</div>
  
  <div class="card">
    <h2>Saved Songs</h2>
    <ul id="songs" class="song-list"></ul>
  </div>

  <button
  style="margin-top:16px; background:#dc2626"
  onclick="deleteSelectedSongs()"
>
  Delete Selected
</button>
  
</div>

<footer>
  Built with ❤️ for music lovers
</footer>

<script>
let allSongs = [];
  let selectedSongs = new Set();
  const songName = document.getElementById('songName');
const youtubeUrl = document.getElementById('youtubeUrl');
const timestamp = document.getElementById('timestamp');
const songsList = document.getElementById('songs');

  function clearSearchFilter() {
  const searchBox = document.getElementById('searchBox');
  searchBox.value = '';
  renderSongs();
}



function clearSelection() {
 
selectedSongs.clear();
  renderSongs();

}


  
async function saveSong() {
  await fetch('/songs', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      song_name: songName.value,
      youtube_url: youtubeUrl.value,
      start_seconds: Number(timestamp.value)
    })
  });

  songName.value = '';
  youtubeUrl.value = '';
  timestamp.value = '';

  loadSongs();
}

async function loadSongs() {
  const res = await fetch('/songs');
  allSongs = await res.json();
  renderSongs();
}

  async function deleteSelectedSongs() {
  const checked = Array.from(
    document.querySelectorAll('.song-check:checked')
  ).map(cb => cb.value);

  if (checked.length === 0) {
    alert('No songs selected');
    return;
  }

  const password = prompt('Enter admin password:');
  if (!password) return;

  const res = await fetch('/songs', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      song_names: checked,
      password
    })
  });

  if (!res.ok) {
    alert('Invalid password or delete failed');
    return;
  }

  alert('Songs deleted');
  loadSongs();
}
function renderSongs() {
  const keyword = document
    .getElementById('searchBox')
    .value
    .toLowerCase();

  songsList.innerHTML = '';

  allSongs
    .filter(song =>
      song.song_name.toLowerCase().includes(keyword)
    )
    .forEach(song => {
      const li = document.createElement('li');
      li.className = 'song-item';

      let link = song.youtube_url;
      link += link.includes('?')
        ? `&t=${song.start_seconds}s`
        : `?t=${song.start_seconds}s`;

      li.innerHTML = `
        <label style="display:flex;align-items:center;gap:8px">
          <input
  type="checkbox"
  class="song-check"
  value="${song.song_name}"
  ${selectedSongs.has(song.song_name) ? 'checked' : ''}
/>
          <span class="song-name">${song.song_name}</span>
        </label>
         <a
        class="play-btn"
        href="${link}"
        target="_blank"
        rel="noopener noreferrer"> Click to Play
</a>
      `;
      songsList.appendChild(li);

const checkbox = li.querySelector('.song-check');

checkbox.addEventListener('change', () => {
  if (checkbox.checked) {
    selectedSongs.add(song.song_name);
  } else {
    selectedSongs.delete(song.song_name);
  }
});
      
    });
}


// Load songs on page load
loadSongs();
</script>

</body>
</html>
